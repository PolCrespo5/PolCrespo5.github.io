<!--
    Pol Crespo

    INSTRUCCIONS REPTE:

    - Gent a la taula. (sino es proporciona serà default 1 persona)
    - Qualificació servei rebut. (required) (Genial(10%) - Acceptable(5%) - Horible(0%))
    - Total compte (cost). (required)

    - Calcular propina per persona i total.


    - Minim propina 0,5€ p/persona (si el calcul de la propina és menor s'aplica el 0,5 per persona)
    - El percentatge sobre el cost del compte i despres dividit per num de gent a la taula
    - Esborrar info del formulari
    - Si hi ha dades incorrectes mantenir formulari

    -HTML, CSS, JS, Bootstrap
    -Validacions i missatges d'error (vermell)
-->

<!-- LINK: https://polcrespo5.github.io/projecteEnBlanc/-->

<!DOCTYPE html>
<html lang="es">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=devide-width, initial-scale=1.0">
        <title>Calculador Propines</title>
        <link rel="stylesheet" href="style/styles.css">
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-T3c6CoIi6uLrA9TneNEoa7RxnatzjcDSCmG1MXxSR1GAsXEV/Dwwykc2MPK8M2HN" crossorigin="anonymous">
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js" integrity="sha384-C6RzsynM9kWDrMNeT87bh95OGNyZPhcTNXj1NW7RuBCsyN/o0jlpcV8Qyq46cDfL" crossorigin="anonymous"></script>
    </head>
    <body>
        <form class="container-fluid" id="myForm" onsubmit="return validarForm()">
            <h1 class="row">Calcula una propina justa</h1>
            <div class="row">
                <label class="col-4">Quants som?</label>
                <label class="col-4">Quin és el total de la factura?</label>
                <label class="col-4">Opina sobre el seu servei</label>
            </div>
            <div class="row">
                <input class="col-4" type="number" id="persones" min="1">
                <input class="col-4" id="compte">
                <select class="col-4" name="servei">
                    <option value="horrible">Horrible</option>
                    <option value="acceptable">Acceptable</option>
                    <option value="genial">Genial</option>
                </select>
            </div>
            <input class="row" style="height: 200px" type="submit" value="Calcula la propina">
        </form>
    </body>
</html>
